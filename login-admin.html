<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Admin - Project 7</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="auth-shell">
      <div class="auth-card">
        <p class="eyebrow">Project 7 Admin</p>
        <h1>Masuk sebagai Admin</h1>
        <p class="muted">Kelola produk, harga, dan tampilan toko dari satu panel.</p>
        <form id="adminLoginForm" class="auth-form">
          <label>
            Username
            <input type="text" id="adminUsername" required placeholder="admin" />
          </label>
          <label>
            Password
            <input type="password" id="adminPassword" required placeholder="admin123" />
          </label>
          <button type="submit" class="btn primary full">Masuk</button>
        </form>
        <p class="helper-text">Default: admin / admin123</p>
        <a class="text-link" href="index.html">Kembali ke awal</a>
      </div>
    </div>
    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
