<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login User - Project 7</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="auth-shell">
      <div class="auth-card">
        <p class="eyebrow">Project 7</p>
        <h1>Masuk sebagai User</h1>
        <p class="muted">Nikmati pengalaman belanja dan lihat produk yang tersedia.</p>
        <form id="userLoginForm" class="auth-form">
          <label>
            Username
            <input type="text" id="userUsername" required placeholder="user" />
          </label>
          <label>
            Password
            <input type="password" id="userPassword" required placeholder="user123" />
          </label>
          <button type="submit" class="btn primary full">Masuk</button>
        </form>
        <div class="promo-box">
          <button id="googleLoginBtn" class="btn secondary full">🔑 Login dengan Google</button>
        </div>
        <p class="helper-text">Default: user / user123</p>
        <a class="text-link" href="index.html">Kembali ke awal</a>
      </div>
    </div>
    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
