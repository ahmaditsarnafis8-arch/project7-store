<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register User - Project 7</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="auth-shell">
      <div class="auth-card">
        <p class="eyebrow">Project 7</p>
        <h1>Buat Akun User</h1>
        <p class="muted">Daftar dengan username dan password sendiri untuk masuk ke toko.</p>
        <form id="registerForm" class="auth-form">
          <label>
            Username
            <input type="text" id="registerUsername" required placeholder="Username Anda" />
          </label>
          <label>
            Password
            <input type="password" id="registerPassword" required placeholder="Password" />
          </label>
          <label>
            Konfirmasi Password
            <input type="password" id="registerConfirmPassword" required placeholder="Ulangi password" />
          </label>
          <button type="submit" class="btn primary full">Daftar</button>
        </form>
        <div class="promo-box">
          <a class="btn secondary full" href="login-user.html">Sudah punya akun? Login</a>
        </div>
        <a class="text-link" href="index.html">Kembali ke awal</a>
      </div>
    </div>
    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
